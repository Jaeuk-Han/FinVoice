<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — FinVoice</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app" id="app">
  <header class="appbar">
    <div class="appbar-in">
      <div class="brand">
        <a href="/" style="text-decoration:none;color:inherit">
          <span class="brand-mark">FinVoice</span>
          <span class="brand-sub">해외 금융뉴스 음성 브리핑</span>
        </a>
      </div>
    </div>
  </header>
  <div class="wrap">
    <div class="auth-box">
      <h1 class="auth-title">로그인</h1>
      {% if error %}
      <div class="alert-banner" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 9v4"/><path d="M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}
      <form class="auth-form" method="POST" action="/login">
        <div class="auth-field">
          <label for="email">이메일</label>
          <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@example.com">
        </div>
        <div class="auth-field">
          <label for="password">비밀번호</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="비밀번호 입력">
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;margin-top:8px">로그인</button>
      </form>
      <p class="auth-link">계정이 없으신가요? <a href="/register">회원가입</a></p>
    </div>
  </div>
</div>
</body>
</html>
